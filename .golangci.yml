version: "2"

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
    - tagliatelle
    - testpackage
    - ireturn
    - containedctx
    - gochecknoglobals
    - paralleltest
    - tparallel
    - revive
    - mnd

  settings:
    govet:
      enable-all: true
    cyclop:
      max-complexity: 20
    gocyclo:
      min-complexity: 20
    funlen:
      lines: 60
      statements: 30
  exclusions:
    rules:
      - path: ".*_test\\.go"
        linters: [gosec]
        text: "G115"
      # Protocol uses SHA-1; field order is ASN.1-defined.
      - path: crypto/crypt.go
        linters: [gosec]
        text: "G401|G505"
      - path: crypto/crypt.go
        linters: [govet]
        text: "fieldalignment"
      # Protocol-defined struct layout; padding optimisation is non-functional.
      - path: handshake/license.go
        linters: [govet]
        text: "fieldalignment"
      - path: handshake/crypt_handshake.go
        linters: [gosec]
        text: "G115"
      - path: discovery/resolver.go
        linters: [gosec]
        text: "G704"
      # Transport hot-path: method grouping and nesting follow protocol pipeline flow.
      - path: transport/handler.go
        linters: [funcorder, nestif]
      - path: transport/quicklz.go
        linters: [nestif]

run:
  timeout: 10m
  go: '1.26'
  tests: true